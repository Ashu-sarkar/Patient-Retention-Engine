services:
  n8n:
    build: .
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      # в”Ђв”Ђ n8n Auth в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE:-true}
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:-strongpass}
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=${N8N_PORT:-5678}
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678}
      # Stable encryption key вЂ” MUST be set before first launch and never changed.
      # Generate with: openssl rand -hex 32
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      # Allow session cookies over plain HTTP (required for local dev without TLS)
      - N8N_SECURE_COOKIE=false
      # Required for workflow Code nodes using $env.*.
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      # Scheduler timezone вЂ” used by cron triggers (WF1вЂ“WF5)
      - GENERIC_TIMEZONE=${TIMEZONE:-Asia/Kolkata}

      # в”Ђв”Ђ n8n internal DB (SQLite for local dev) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      # Run ./launch.sh (runs scripts/preflight-supabase.js) so Supabase schema + pooler stay aligned.
      # Supabase direct host is IPv6-only; Docker on macOS cannot route IPv6.
      # Workflow nodes still reach Supabase via HTTP/Postgres credentials.
      # To switch back to Postgres, resolve the IPv6/pooler issue and uncomment:
      # - DB_TYPE=postgresdb
      # - DB_POSTGRESDB_HOST=${SUPABASE_DB_HOST}
      # - DB_POSTGRESDB_PORT=${SUPABASE_DB_PORT:-5432}
      # - DB_POSTGRESDB_DATABASE=${SUPABASE_DB_NAME:-postgres}
      # - DB_POSTGRESDB_USER=${SUPABASE_DB_USER:-postgres}
      # - DB_POSTGRESDB_PASSWORD=${SUPABASE_DB_PASSWORD}
      # - DB_POSTGRESDB_SSL_ENABLED=true
      # - DB_POSTGRESDB_SSL_REJECT_UNAUTHORIZED=true
      - DB_TYPE=sqlite

      # в”Ђв”Ђ Supabase (available as $env.* inside n8n Code/HTTP nodes) в”Ђв”Ђв”Ђв”Ђв”Ђ
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}

      # в”Ђв”Ђ WhatsApp via Twilio Programmable Messaging в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_WHATSAPP_FROM=${TWILIO_WHATSAPP_FROM}
      - TWILIO_STATUS_CALLBACK_URL=${TWILIO_STATUS_CALLBACK_URL}
      - TWILIO_CONTENT_WELCOME=${TWILIO_CONTENT_WELCOME}
      - TWILIO_CONTENT_FOLLOW_UP_REMINDER=${TWILIO_CONTENT_FOLLOW_UP_REMINDER}
      - TWILIO_CONTENT_SAME_DAY_REMINDER=${TWILIO_CONTENT_SAME_DAY_REMINDER}
      - TWILIO_CONTENT_MISSED_RECOVERY=${TWILIO_CONTENT_MISSED_RECOVERY}
      - TWILIO_CONTENT_MISSED_NUDGE=${TWILIO_CONTENT_MISSED_NUDGE}
      - TWILIO_CONTENT_HEALTH_CHECK=${TWILIO_CONTENT_HEALTH_CHECK}
      - TWILIO_CONTENT_REACTIVATION=${TWILIO_CONTENT_REACTIVATION}
      - TWILIO_CONTENT_PATIENT_ONBOARDING=${TWILIO_CONTENT_PATIENT_ONBOARDING}
      - TWILIO_CONTENT_HOSPITAL_ONBOARDING=${TWILIO_CONTENT_HOSPITAL_ONBOARDING}
      - TWILIO_CONTENT_PRESCRIPTION_DELIVERY=${TWILIO_CONTENT_PRESCRIPTION_DELIVERY}
      - TWILIO_CONTENT_PATIENT_REMINDER=${TWILIO_CONTENT_PATIENT_REMINDER}
      - TWILIO_CONTENT_MEDICINE_REMINDER=${TWILIO_CONTENT_MEDICINE_REMINDER}

      # в”Ђв”Ђ Application settings в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - TIMEZONE=${TIMEZONE:-Asia/Kolkata}
      - MAX_MESSAGE_COUNT=${MAX_MESSAGE_COUNT:-5}
      - MIN_HOURS_BETWEEN_MESSAGES=${MIN_HOURS_BETWEEN_MESSAGES:-23}
      - DEFAULT_CLINIC_NAME=${DEFAULT_CLINIC_NAME:-Our Clinic}
      - DEFAULT_DOCTOR_NAME=${DEFAULT_DOCTOR_NAME:-Your Doctor}
      # Plain E.164 digits, e.g. 919876543210
      - ADMIN_WHATSAPP_NUMBER=${ADMIN_WHATSAPP_NUMBER:-}

    env_file:
      - .env

    volumes:
      - n8n_data:/home/node/.n8n

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  n8n_data:
