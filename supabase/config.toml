# Supabase project config. Doctor dashboard auth uses onboarding-created
# username/password accounts, so SMS OTP hooks stay disabled.
project_id = "crsdccqseuhnimoxxeky"

[auth]
enabled = true
site_url = "https://vaitalcare-doctor.vercel.app"
additional_redirect_urls = [
  "https://vaitalcare-doctor.vercel.app",
  "https://vaitalcare-doctor.vercel.app/",
  "http://localhost:3000",
  "http://127.0.0.1:3000",
]

[auth.sms]
enable_signup = false
enable_confirmations = false
